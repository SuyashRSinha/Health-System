<!DOCTYPE html>
<html>
<head>
  <title>Health Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- ✅ Chart.js FIRST -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script> //server 
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<h1>Health Monitoring Dashboard</h1>

<div class="container">
  <div class="card">
    <div class="title">Heart Rate</div>
    <div class="value" id="hr">--</div>
  </div>

  <div class="card">
    <div class="title">Temperature</div>
    <div class="value" id="temp">--</div>
  </div>

  <div class="card">
    <div class="title">SpO2</div>
    <div class="value" id="spo2">--</div>
  </div>

  <div class="card">
    <div class="title">ECG</div>
    <div class="value" id="glucose">--</div>
  </div>
</div>

<!-- 📊 Graphs -->
<div class="charts">
  <div class="chart-box"><canvas id="hrChart"></canvas></div>
  <div class="chart-box"><canvas id="tempChart"></canvas></div>
  <div class="chart-box"><canvas id="spo2Chart"></canvas></div>
  <div class="chart-box"><canvas id="glucoseChart"></canvas></div>
</div>

<!-- ✅ YOUR SCRIPT LAST -->
<script src="script.js"></script>

</body>
</html>
